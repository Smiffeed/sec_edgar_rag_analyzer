name: CI Pipeline

on:
  push:
      branches:
        - master

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Run python-version
        run: |
          uv venv
          uv pip install pytest
          uv pip install unstructured
          uv run pytest test_parse.py
